<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESP-01 Clicker Panel</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <style>
    :root {
      --bg: #0b0d12;
      --panel: #121722;
      --line: rgba(255,255,255,.08);
      --text: #eef2ff;
      --muted: #99a2b3;
      --accent: #63e;
      --accent2: #41d1a0;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #0b0d12, #090b0f 50%, #0b0d12);
      color: var(--text);
    }
    .wrap {
      width: min(1200px, calc(100% - 24px));
      margin: 24px auto 40px;
    }
    h1 { margin: 0 0 8px; font-size: 30px; }
    .muted { color: var(--muted); }
    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(12, 1fr);
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.22);
    }
    .stat { grid-column: span 3; }
    .wide { grid-column: span 12; }
    .half { grid-column: span 6; }
    .num { font-size: 34px; font-weight: 800; margin-top: 8px; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%; display: inline-block;
      background: var(--accent2); margin-right: 8px;
      box-shadow: 0 0 12px rgba(65,209,160,.75);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 600; }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: rgba(255,255,255,.06);
      padding: 3px 6px;
      border-radius: 8px;
    }
    .pill {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid var(--line); border-radius: 999px;
      padding: 8px 12px; color: var(--muted);
    }
    .empty { color: var(--muted); padding: 10px 0 4px; }
    @media (max-width: 900px) {
      .stat, .half, .wide { grid-column: span 12; }
      h1 { font-size: 24px; }
      .num { font-size: 28px; }
      table { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ESP-01 Clicker Panel</h1>
    <div class="muted" style="margin-bottom:18px;">Her tuş basışı server zaman damgası ile kaydedilir.</div>

    <div class="grid">
      <div class="card stat">
        <div class="muted">Toplam click</div>
        <div class="num" id="totalClicks">0</div>
      </div>
      <div class="card stat">
        <div class="muted">Aktif cihaz sayısı</div>
        <div class="num" id="deviceCount">0</div>
      </div>
      <div class="card stat">
        <div class="muted">Tutulan event</div>
        <div class="num" id="eventCount">0</div>
      </div>
      <div class="card stat">
        <div class="muted">Canlı bağlantı</div>
        <div class="num" id="liveStatus" style="font-size:20px; display:flex; align-items:center;"><span class="dot"></span>bağlı</div>
      </div>

      <div class="card half">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:8px;">
          <strong>Cihazlar</strong>
          <span class="pill">Kaynak: <code>/api/click</code></span>
        </div>
        <div id="devicesWrap"></div>
      </div>

      <div class="card half">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:8px;">
          <strong>Son tıklamalar</strong>
          <span class="pill">Canlı: Socket.IO</span>
        </div>
        <div id="eventsWrap"></div>
      </div>
    </div>
  </div>

  <script>
    const totalClicksEl = document.getElementById('totalClicks');
    const deviceCountEl = document.getElementById('deviceCount');
    const eventCountEl = document.getElementById('eventCount');
    const devicesWrap = document.getElementById('devicesWrap');
    const eventsWrap = document.getElementById('eventsWrap');
    const liveStatus = document.getElementById('liveStatus');

    function fmtIso(v) {
      if (!v) return '-';
      const d = new Date(v);
      return d.toLocaleString('tr-TR');
    }

    function renderDevices(devices) {
      if (!devices.length) {
        devicesWrap.innerHTML = '<div class="empty">Henüz cihaz yok.</div>';
        return;
      }

      devicesWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Device</th>
              <th>Click</th>
              <th>Son görülme</th>
              <th>RSSI</th>
            </tr>
          </thead>
          <tbody>
            ${devices.map(d => `
              <tr>
                <td><code>${escapeHtml(d.deviceId)}</code></td>
                <td>${d.clickCount}</td>
                <td>${fmtIso(d.lastSeenAt)}</td>
                <td>${d.lastRssi ?? '-'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderEvents(events) {
      if (!events.length) {
        eventsWrap.innerHTML = '<div class="empty">Henüz event yok.</div>';
        return;
      }

      eventsWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Device</th>
              <th>Server timestamp</th>
              <th>Device ts</th>
            </tr>
          </thead>
          <tbody>
            ${events.map(e => `
              <tr>
                <td>${e.seq}</td>
                <td><code>${escapeHtml(e.deviceId)}</code></td>
                <td>${fmtIso(e.serverTimestamp)}</td>
                <td>${e.deviceTimestamp ?? '-'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderState(state) {
      totalClicksEl.textContent = state.totalClicks || 0;
      deviceCountEl.textContent = (state.devices || []).length;
      eventCountEl.textContent = (state.events || []).length;
      renderDevices(state.devices || []);
      renderEvents(state.events || []);
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    fetch('/api/state')
      .then(r => r.json())
      .then(renderState)
      .catch(() => {
        liveStatus.innerHTML = '<span class="dot" style="background:var(--danger); box-shadow:none;"></span>ilk veri alınamadı';
      });

    const socket = io();
    socket.on('connect', () => {
      liveStatus.innerHTML = '<span class="dot"></span>bağlı';
    });
    socket.on('disconnect', () => {
      liveStatus.innerHTML = '<span class="dot" style="background:var(--danger); box-shadow:none;"></span>kopuk';
    });
    socket.on('state', renderState);
  </script>
</body>
</html>
